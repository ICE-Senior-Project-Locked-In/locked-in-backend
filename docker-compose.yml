services:
  postgres:
    image: postgres:17-alpine
    container_name: locked-in-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: locked_in_user
      POSTGRES_PASSWORD: locked_in_password
      POSTGRES_DB: locked_in_db
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: "UTC"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locked_in_user -d locked_in_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - locked-in-network

  redis:
    image: redis:8.0-alpine
    container_name: locked-in-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    environment:
      TZ: "UTC"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - locked-in-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: locked-in-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://locked_in_user:locked_in_password@postgres:5432/locked_in_db
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - locked-in-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  locked-in-network:
    driver: bridge
